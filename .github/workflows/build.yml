name: Build mobile apps

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# Combined Android + iOS Capacitor build for the project under mobile-app/.
#
# Android: always produces an unsigned debug APK.
#
# iOS: two paths chosen automatically by the "Detect signing configuration"
# step.
#
#   1) SIGNED .ipa — runs when ALL SIX of these repo secrets are configured.
#      Output artifact: ios-ipa-signed.
#
#        IOS_P12_BASE64        base64 of your iOS Distribution .p12
#        IOS_P12_PASSWORD      password for the .p12
#        APPSTORE_ISSUER_ID    App Store Connect API issuer ID (UUID)
#        APPSTORE_KEY_ID       App Store Connect API key ID
#        APPSTORE_PRIVATE_KEY  full contents of the .p8 key file
#        APPSTORE_TEAM_ID      your 10-character Apple Team ID
#
#      Optional:
#        APPSTORE_BUNDLE_ID    bundle id for provisioning profile download
#                              (defaults to com.peetrix.fitwayhub)
#
#   2) UNSIGNED .ipa — runs when any of those is missing. Output artifact:
#      ios-ipa-unsigned. Proper device .ipa container (zip with
#      Payload/App.app/ inside). Stock iOS won't launch it on its own, but
#      it IS the format expected by re-signers: AltStore / SideStore,
#      Sideloadly, Apple Configurator 2, Xcode "Devices and Simulators →
#      Install from .ipa", TrollStore on supported devices.
#
# Optional:
#   VITE_API_BASE   Baked into the web bundle at build time. If missing, the
#                   app falls back to https://www.fitwayhub.com (see
#                   mobile-app/src/lib/api.ts).

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle (Capacitor)
        run: npm run build
        env:
          CAPACITOR_BUILD: 'true'
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          # Enable native push automatically when the Firebase Android config
          # secret is configured. (Only the presence of the secret is read here,
          # not its contents.)
          VITE_ENABLE_NATIVE_PUSH: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON != '' }}

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # Write the Firebase config so FCM push works in the built APK. No-op when
      # the secret isn't set (native push simply stays disabled — see README).
      - name: Configure Firebase (Android)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Wrote android/app/google-services.json (native push enabled)."
          else
            echo "ANDROID_GOOGLE_SERVICES_JSON secret not set — native push disabled."
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    name: Build iOS
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle (Capacitor)
        run: npm run build
        env:
          CAPACITOR_BUILD: 'true'
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          # Enable native push automatically when the Firebase iOS config secret
          # is configured. (Only the presence of the secret is read here.)
          VITE_ENABLE_NATIVE_PUSH: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST != '' }}

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then
            if ! npm ls @capacitor/ios --depth=0 >/dev/null 2>&1; then
              npm install --no-audit --no-fund @capacitor/ios
            fi
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: |
          set -e
          # If scaffold is incomplete (Podfile missing AND no Package.swift), nuke and regenerate
          if [ ! -f ios/App/Podfile ] && [ ! -f ios/Podfile ] && [ ! -f ios/App/Package.swift ]; then
            rm -rf ios
            if ! npm ls @capacitor/ios --depth=0 >/dev/null 2>&1; then
              npm install --no-audit --no-fund @capacitor/ios
            fi
            npx cap add ios
          fi
          # Retry: cap sync runs `pod install`, which downloads native pod
          # binaries (e.g. IONGeolocationLib) from the GitHub release CDN, which
          # intermittently returns 504. Retry a few times before giving up.
          for attempt in 1 2 3 4; do
            if npx cap sync ios; then break; fi
            if [ "$attempt" = "4" ]; then echo "::error::cap sync ios failed after 4 attempts"; exit 1; fi
            echo "::warning::cap sync ios failed (attempt $attempt) — retrying in 20s"
            sleep 20
          done

      # Write the Firebase iOS config so FCM push works in the built app. No-op
      # when the secret isn't set (native push simply stays disabled).
      - name: Configure Firebase (iOS)
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > ios/App/App/GoogleService-Info.plist
            echo "Wrote ios/App/App/GoogleService-Info.plist (native push enabled)."
          else
            echo "IOS_GOOGLE_SERVICE_INFO_PLIST secret not set — native push disabled."
          fi

      - name: Install CocoaPods
        working-directory: mobile-app/ios/App
        run: |
          for attempt in 1 2 3 4; do
            if pod install --repo-update; then break; fi
            if [ "$attempt" = "4" ]; then echo "::error::pod install failed after 4 attempts"; exit 1; fi
            echo "::warning::pod install failed (attempt $attempt) — retrying in 20s"
            sleep 20
          done

      # ── Decide signed vs unsigned path. Single-line `if` + set +e + explicit
      #    exit 0 so this step can never tank the workflow regardless of which
      #    secrets are or aren't present.
      - name: Detect signing configuration
        id: signing
        shell: bash
        env:
          HAS_P12: ${{ secrets.IOS_P12_BASE64 != '' }}
          HAS_PASSWORD: ${{ secrets.IOS_P12_PASSWORD != '' }}
          HAS_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID != '' }}
          HAS_KEY_ID: ${{ secrets.APPSTORE_KEY_ID != '' }}
          HAS_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY != '' }}
          HAS_TEAM_ID: ${{ secrets.APPSTORE_TEAM_ID != '' }}
        run: |
          set +e
          SIGNED=false
          if [ "$HAS_P12" = "true" ] && [ "$HAS_PASSWORD" = "true" ] && [ "$HAS_ISSUER_ID" = "true" ] && [ "$HAS_KEY_ID" = "true" ] && [ "$HAS_PRIVATE_KEY" = "true" ] && [ "$HAS_TEAM_ID" = "true" ]; then
            SIGNED=true
          fi
          echo "signed=$SIGNED" >> "$GITHUB_OUTPUT"
          if [ "$SIGNED" = "true" ]; then
            echo "Signing secrets present — producing a signed .ipa"
          else
            echo "Signing secrets missing — producing an unsigned .ipa for re-signing tools (AltStore/Sideloadly/Xcode)"
          fi
          exit 0

      # ─────────────────────────── SIGNED DEVICE BUILD ─────────────────
      - name: Import code-signing certs
        if: steps.signing.outputs.signed == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Download provisioning profile
        if: steps.signing.outputs.signed == 'true'
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: ${{ secrets.APPSTORE_BUNDLE_ID || 'com.peetrix.fitwayhub' }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Write ExportOptions.plist (signed)
        if: steps.signing.outputs.signed == 'true'
        working-directory: mobile-app/ios/App
        env:
          TEAM_ID: ${{ secrets.APPSTORE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Archive (signed, iphoneos)
        if: steps.signing.outputs.signed == 'true'
        working-directory: mobile-app/ios/App
        env:
          TEAM_ID: ${{ secrets.APPSTORE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export signed IPA
        if: steps.signing.outputs.signed == 'true'
        working-directory: mobile-app/ios/App
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload signed IPA
        if: steps.signing.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-signed
          path: mobile-app/ios/App/build/ipa/*.ipa
          if-no-files-found: error

      # ───────────────────── UNSIGNED FALLBACK ARCHIVE ─────────────────
      - name: Archive (unsigned)
        if: steps.signing.outputs.signed == 'false'
        working-directory: mobile-app/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Package unsigned IPA
        if: steps.signing.outputs.signed == 'false'
        working-directory: mobile-app/ios/App
        run: |
          APP_PATH=$(ls -d build/App.xcarchive/Products/Applications/*.app 2>/dev/null | head -n1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app found inside the archive"
            find build/App.xcarchive -maxdepth 4 -print 2>/dev/null || true
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -qr ../FitWayHub-unsigned.ipa Payload
          ls -lh ../FitWayHub-unsigned.ipa

      - name: Upload unsigned IPA
        if: steps.signing.outputs.signed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: mobile-app/ios/App/build/FitWayHub-unsigned.ipa
          if-no-files-found: error
