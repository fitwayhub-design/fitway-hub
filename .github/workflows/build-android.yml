name: Build Android APK

# Manual-only. Pushes to main are handled by the combined "Build mobile apps"
# workflow (build.yml), which builds Android + iOS in one run. This standalone
# workflow stays available via the Actions tab for on-demand Android-only
# rebuilds without spending a macOS runner on iOS.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle (Capacitor)
        run: npm run build
        env:
          CAPACITOR_BUILD: 'true'
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_ENABLE_NATIVE_PUSH: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON != '' }}

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      # Write Firebase config so FCM push works in the APK. No-op without secret.
      - name: Configure Firebase (Android)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Wrote android/app/google-services.json (native push enabled)."
          else
            echo "ANDROID_GOOGLE_SERVICES_JSON secret not set — native push disabled."
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: mobile-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
